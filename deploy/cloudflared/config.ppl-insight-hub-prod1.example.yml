# Cloudflare Tunnel config template for Fantasy Football Pi
# Tunnel name: ppl-insight-hub-prod1
# Domain: pplinsighthub.com
#
# If tunnel runs ON the Pi, service should point to localhost:80.
# If tunnel runs on another host (Windows PC), change service to the Pi LAN IP,
# e.g. http://192.168.1.50:80.

tunnel: ppl-insight-hub-prod1

ingress:
  - hostname: pplinsighthub.com
    service: http://127.0.0.1:80
  - hostname: www.pplinsighthub.com
    service: http://127.0.0.1:80
  - service: http_status:404
