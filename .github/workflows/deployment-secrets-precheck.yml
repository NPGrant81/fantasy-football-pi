name: Deployment Secrets Precheck

on:
  schedule:
    # Daily at 05:15 UTC, ahead of most maintenance windows.
    - cron: "15 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  precheck-production:
    name: Precheck Production Secrets
    runs-on: ubuntu-latest
    environment: production
    outputs:
      missing_csv: ${{ steps.validate.outputs.missing_csv }}
      missing_count: ${{ steps.validate.outputs.missing_count }}
    steps:
      - name: Validate production secrets
        id: validate
        env:
          PROD_DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
          PROD_DEPLOY_USER: ${{ secrets.PROD_DEPLOY_USER }}
          PROD_DEPLOY_SSH_KEY: ${{ secrets.PROD_DEPLOY_SSH_KEY }}
          PROD_DEPLOY_APP_DIR: ${{ secrets.PROD_DEPLOY_APP_DIR }}
          PROD_DEPLOY_KNOWN_HOST: ${{ secrets.PROD_DEPLOY_KNOWN_HOST }}
        run: |
          set -euo pipefail
          missing=()

          [ -n "${PROD_DEPLOY_HOST:-}" ] || missing+=("PROD_DEPLOY_HOST")
          [ -n "${PROD_DEPLOY_USER:-}" ] || missing+=("PROD_DEPLOY_USER")
          [ -n "${PROD_DEPLOY_SSH_KEY:-}" ] || missing+=("PROD_DEPLOY_SSH_KEY")
          [ -n "${PROD_DEPLOY_APP_DIR:-}" ] || missing+=("PROD_DEPLOY_APP_DIR")
          [ -n "${PROD_DEPLOY_KNOWN_HOST:-}" ] || missing+=("PROD_DEPLOY_KNOWN_HOST")

          if [ ${#missing[@]} -gt 0 ]; then
            printf "missing_csv=%s\n" "$(IFS=,; echo "${missing[*]}")" >> "$GITHUB_OUTPUT"
            printf "missing_count=%s\n" "${#missing[@]}" >> "$GITHUB_OUTPUT"
            echo "Missing production secrets: ${missing[*]}"
            exit 1
          fi

          echo "missing_csv=" >> "$GITHUB_OUTPUT"
          echo "missing_count=0" >> "$GITHUB_OUTPUT"
          echo "All required production secrets are present."

  precheck-staging:
    name: Precheck Staging Secrets
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      missing_csv: ${{ steps.validate.outputs.missing_csv }}
      missing_count: ${{ steps.validate.outputs.missing_count }}
    steps:
      - name: Validate staging secrets
        id: validate
        env:
          STAGING_DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          STAGING_DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
          STAGING_DEPLOY_SSH_KEY: ${{ secrets.STAGING_DEPLOY_SSH_KEY }}
          STAGING_DEPLOY_APP_DIR: ${{ secrets.STAGING_DEPLOY_APP_DIR }}
          STAGING_DEPLOY_KNOWN_HOST: ${{ secrets.STAGING_DEPLOY_KNOWN_HOST }}
        run: |
          set -euo pipefail
          missing=()

          [ -n "${STAGING_DEPLOY_HOST:-}" ] || missing+=("STAGING_DEPLOY_HOST")
          [ -n "${STAGING_DEPLOY_USER:-}" ] || missing+=("STAGING_DEPLOY_USER")
          [ -n "${STAGING_DEPLOY_SSH_KEY:-}" ] || missing+=("STAGING_DEPLOY_SSH_KEY")
          [ -n "${STAGING_DEPLOY_APP_DIR:-}" ] || missing+=("STAGING_DEPLOY_APP_DIR")
          [ -n "${STAGING_DEPLOY_KNOWN_HOST:-}" ] || missing+=("STAGING_DEPLOY_KNOWN_HOST")

          if [ ${#missing[@]} -gt 0 ]; then
            printf "missing_csv=%s\n" "$(IFS=,; echo "${missing[*]}")" >> "$GITHUB_OUTPUT"
            printf "missing_count=%s\n" "${#missing[@]}" >> "$GITHUB_OUTPUT"
            echo "Missing staging secrets: ${missing[*]}"
            exit 1
          fi

          echo "missing_csv=" >> "$GITHUB_OUTPUT"
          echo "missing_count=0" >> "$GITHUB_OUTPUT"
          echo "All required staging secrets are present."

  report:
    name: Publish Precheck Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - precheck-production
      - precheck-staging
    steps:
      - name: Write summary
        run: |
          echo "## Deployment Secrets Precheck" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Time: $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.precheck-production.result }}" = "success" ]; then
            echo "- Production: PASS" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Production: FAIL (missing: ${{ needs.precheck-production.outputs.missing_csv }})" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${{ needs.precheck-staging.result }}" = "success" ]; then
            echo "- Staging: PASS" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Staging: FAIL (missing: ${{ needs.precheck-staging.outputs.missing_csv }})" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail when any environment is missing required secrets
        if: needs.precheck-production.result != 'success' || needs.precheck-staging.result != 'success'
        run: |
          echo "One or more environments are missing required deployment secrets."
          exit 1
