name: Source Prechecks

on:
  schedule:
    # Weekly run every Monday at 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  source-prechecks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          if [ -f etl/requirements.txt ]; then pip install -r etl/requirements.txt; fi

      - name: Run FantasyNerds precheck
        env:
          FANTASYNERDS_API_KEY: ${{ secrets.FANTASYNERDS_API_KEY }}
        run: |
          python -m etl.fantasynerds_preprod_check

      - name: Run Yahoo precheck
        env:
          YAHOO_CLIENT_ID: ${{ secrets.YAHOO_CLIENT_ID }}
          YAHOO_CLIENT_SECRET: ${{ secrets.YAHOO_CLIENT_SECRET }}
          YAHOO_ACCESS_TOKEN: ${{ secrets.YAHOO_ACCESS_TOKEN }}
          YAHOO_REFRESH_TOKEN: ${{ secrets.YAHOO_REFRESH_TOKEN }}
        run: |
          python -m etl.yahoo_preprod_check