name: "Sync NFL Rosters"

on:
  schedule:
    # Tuesdays 06:00 UTC (off-peak, after Monday Night Football resolves)
    - cron: "0 6 * * 2"
    # Fridays 06:00 UTC (catch mid-week cuts, injury designations, trades)
    - cron: "0 6 * * 5"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger (optional)"
        required: false
        default: "Manual roster refresh"

permissions:
  contents: read

jobs:
  sync-rosters:
    name: "Sync Active NFL Rosters"
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - name: Preflight required secrets
        id: preflight
        env:
          PROD_DEPLOY_SSH_KEY: ${{ secrets.PROD_DEPLOY_SSH_KEY }}
          PROD_DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
          PROD_DEPLOY_USER: ${{ secrets.PROD_DEPLOY_USER }}
          PROD_DEPLOY_APP_DIR: ${{ secrets.PROD_DEPLOY_APP_DIR }}
          PROD_DEPLOY_KNOWN_HOST: ${{ secrets.PROD_DEPLOY_KNOWN_HOST }}
        run: |
          set -euo pipefail
          missing=()

          [ -n "${PROD_DEPLOY_SSH_KEY:-}" ] || missing+=("PROD_DEPLOY_SSH_KEY")
          [ -n "${PROD_DEPLOY_HOST:-}" ] || missing+=("PROD_DEPLOY_HOST")
          [ -n "${PROD_DEPLOY_USER:-}" ] || missing+=("PROD_DEPLOY_USER")
          [ -n "${PROD_DEPLOY_APP_DIR:-}" ] || missing+=("PROD_DEPLOY_APP_DIR")
          [ -n "${PROD_DEPLOY_KNOWN_HOST:-}" ] || missing+=("PROD_DEPLOY_KNOWN_HOST")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "can_run=false" >> "$GITHUB_OUTPUT"
            printf "missing_csv=%s\n" "$(IFS=,; echo "${missing[*]}")" >> "$GITHUB_OUTPUT"
            echo "Roster sync preflight: missing required secrets: ${missing[*]}"
          else
            echo "can_run=true" >> "$GITHUB_OUTPUT"
            echo "missing_csv=" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH key
        if: steps.preflight.outputs.can_run == 'true'
        env:
          PROD_DEPLOY_SSH_KEY: ${{ secrets.PROD_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PROD_DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519

      - name: Trust production host
        if: steps.preflight.outputs.can_run == 'true'
        env:
          DEPLOY_KNOWN_HOST: ${{ secrets.PROD_DEPLOY_KNOWN_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KNOWN_HOST" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run roster sync on Pi
        if: steps.preflight.outputs.can_run == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.PROD_DEPLOY_USER }}
          DEPLOY_APP_DIR: ${{ secrets.PROD_DEPLOY_APP_DIR }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts -o IdentitiesOnly=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_DIR='$DEPLOY_APP_DIR' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail
          cd "$APP_DIR/backend"

          # Activate virtual environment if present alongside the app dir
          if [ -f "../.venv/bin/activate" ]; then
            # shellcheck disable=SC1091
            source "../.venv/bin/activate"
          elif [ -f ".venv/bin/activate" ]; then
            # shellcheck disable=SC1091
            source ".venv/bin/activate"
          fi

          # Load the production environment so DATABASE_URL etc. are set
          if [ -f "/etc/fantasy-football-pi/backend.env" ]; then
            set -a
            # shellcheck disable=SC1091
            source "/etc/fantasy-football-pi/backend.env"
            set +a
          fi

          echo "▶ Starting NFL reality sync ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          python3 -c "import sys, os; sys.path.insert(0, os.getcwd()); from scripts.daily_sync import sync_nfl_reality; sync_nfl_reality(); print('Roster sync complete')"
          REMOTE_SCRIPT

      - name: Report sync summary
        if: always()
        run: |
          if [ "${{ steps.preflight.outputs.can_run }}" != "true" ]; then
            echo "## ⚠️ NFL Roster Sync Skipped (Configuration Required)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Missing required secrets: ${{ steps.preflight.outputs.missing_csv }}" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ job.status }}" = "success" ]; then
            echo "## ✅ NFL Roster Sync Succeeded" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ❌ NFL Roster Sync Failed" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Triggered:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "- **Reason:** ${{ inputs.reason }}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"⚠️ *NFL Roster Sync Failed* — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"
          fi
