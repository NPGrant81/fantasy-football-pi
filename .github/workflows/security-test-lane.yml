name: Security Test Lane

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  security-backend-suite:
    name: security-backend-suite
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-security-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          if [ -f backend/requirements-validation.txt ]; then pip install -r backend/requirements-validation.txt; fi

      - name: Run auth and token tests
        run: |
          python -m pytest -q \
            backend/tests/test_core_security.py \
            backend/tests/test_auth_cookie_csrf.py

      - name: Run session and CSRF hardening tests
        run: |
          python -m pytest -q \
            backend/tests/test_security_hardening.py

      - name: Run runtime security guardrail tests
        run: |
          python -m pytest -q \
            backend/tests/test_db_credentials_guardrail.py \
            backend/tests/test_sqlite_runtime_guardrail.py
