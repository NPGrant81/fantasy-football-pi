# Contributor CI – quick checks on every PR
# Maintainers: adjust install commands (requirements file paths, npm scripts, etc.) as needed.

name: Contributor CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: fantasy_pi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/fantasy_pi

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install backend dependencies
        # Edit this command to match your requirements file(s)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests
        run: pytest backend -q
        env:
          PYTHONPATH: .
          DATABASE_URL: ${{ env.DATABASE_URL }}

  frontend-tests:
    name: Frontend tests & lint (Node 18)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        working-directory: frontend
        # --legacy-peer-deps is required because some dependencies have peer conflict declarations
        # that are not yet resolved; remove once upstream packages are updated.
        run: npm ci --legacy-peer-deps

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  e2e:
    name: E2E (optional – remove if not needed)
    runs-on: ubuntu-latest
    needs: frontend-tests
    # Remove or replace this job when E2E tests are not yet set up
    if: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run Cypress E2E
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          install: false
          start: npm run dev
          wait-on: http://localhost:5173
          wait-on-timeout: 120
          browser: chrome
          spec: cypress/e2e/**/*.spec.js
