name: UI UX Automation

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  ui-ux-automation:
    runs-on: ubuntu-latest
    env:
      UI_HOST: 127.0.0.1
      UI_PORT_A11Y: 5173
      UI_PORT_VISUAL: 5174
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Lint UI components and pages
        working-directory: frontend
        run: |
          npx eslint src/components src/pages

      - name: Enforce light-first theme guardrails
        id: theme_guardrails
        continue-on-error: true
        working-directory: frontend
        run: |
          set +e
          npm run lint:theme 2>&1 | tee ../theme-lint.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Comment PR with theme guardrail failures
        if: github.event_name == 'pull_request' && steps.theme_guardrails.outputs.exit_code != '0'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- theme-guardrails-report -->';
            const logPath = 'theme-lint.log';
            const fallback = 'Theme guardrails failed, but no lint log was captured.';
            let log = fallback;

            if (fs.existsSync(logPath)) {
              log = fs.readFileSync(logPath, 'utf8').trim() || fallback;
            }

            const maxLen = 50000;
            if (log.length > maxLen) {
              log = `${log.slice(0, maxLen)}\n\n...output truncated...`;
            }

            const body = `${marker}
            ## Theme Guardrails Failed

            The light-first theme guardrail check failed in CI.

            <details>
            <summary>Failure Output</summary>

            \`\`\`
            ${log}
            \`\`\`

            </details>

            Please convert dark-first classes to light-first with dark overrides.`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (c) => c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload theme guardrail log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: theme-guardrail-log
          if-no-files-found: ignore
          path: theme-lint.log

      - name: Fail when theme guardrails fail
        if: steps.theme_guardrails.outputs.exit_code != '0'
        run: |
          echo "Theme guardrails failed. See PR comment and artifact for details."
          exit 1

      - name: Run accessibility smoke checks
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          install: false
          start: npm run dev -- --host ${{ env.UI_HOST }} --port ${{ env.UI_PORT_A11Y }} --strictPort
          wait-on: http://${{ env.UI_HOST }}:${{ env.UI_PORT_A11Y }}
          wait-on-timeout: 120
          config: baseUrl=http://${{ env.UI_HOST }}:${{ env.UI_PORT_A11Y }}
          browser: chrome
          spec: cypress/e2e/accessibility_smoke.spec.js

      - name: Run screenshot capture for visual regression
        continue-on-error: true
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          install: false
          start: npm run dev -- --host ${{ env.UI_HOST }} --port ${{ env.UI_PORT_VISUAL }} --strictPort
          wait-on: http://${{ env.UI_HOST }}:${{ env.UI_PORT_VISUAL }}
          wait-on-timeout: 120
          config: baseUrl=http://${{ env.UI_HOST }}:${{ env.UI_PORT_VISUAL }}
          browser: chrome
          spec: cypress/e2e/uat_capture_pages.spec.js

      - name: Validate screenshot baseline stability
        working-directory: frontend
        run: |
          node scripts/assert-visual-regression-clean.mjs

      - name: Build frontend preview artifact
        working-directory: frontend
        run: npm run build

      - name: Upload frontend preview artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-preview-dist
          path: frontend/dist

      - name: Upload UI screenshot artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-ux-screenshots
          if-no-files-found: ignore
          path: frontend/cypress/screenshots

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-ux-cypress-videos
          if-no-files-found: ignore
          path: frontend/cypress/videos

      - name: Publish UI UX pipeline summary
        if: always()
        run: |
          {
            echo "## UI/UX Automation Summary"
            echo ""
            echo "- Accessibility smoke checks: executed"
            echo "- Visual regression check: screenshot baseline validation executed"
            echo "- UI component linting: executed"
            echo "- PR preview artifact: frontend-preview-dist"
            echo "- Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

