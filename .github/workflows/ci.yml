name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      duration_seconds: ${{ steps.timing_end.outputs.duration_seconds }}
      failure_category: ${{ steps.result_category.outputs.category }}
    strategy:
      matrix:
        python-version: [3.11]
    # spin up a postgres container for backend tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: fantasy_pi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/fantasy_pi

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce test delta for feature/bugfix PRs
        # Skip on direct pushes to main (merge commits) and on chore/docs/refactor PRs.
        # A PR is exempt if its title starts with: chore, docs, refactor, ci, build, style, test
        # or if the PR has zero changed files (shouldn't happen, but guard against it).
        if: github.event_name == 'pull_request'
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          EXEMPT_PREFIXES="^(chore|docs|refactor|ci|build|style|test)[:(]"

          if echo "$PR_TITLE" | grep -qiE "$EXEMPT_PREFIXES"; then
            echo "PR title indicates exempt type — skipping test delta check."
            exit 0
          fi

          echo "Checking for test file changes in this PR..."

          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          TEST_DELTA=$(echo "$CHANGED" | grep -E \
            '(^frontend/tests/|^backend/tests/test_|^etl/test_|tests/feature_test_matrix\.yaml)' \
            || true)

          if [ -z "$TEST_DELTA" ]; then
            echo ""
            echo "ERROR: No test files added or modified in this PR."
            echo ""
            echo "Every feature/bugfix PR must include at least one of:"
            echo "  - frontend/tests/*.test.{js,jsx}"
            echo "  - backend/tests/test_*.py"
            echo "  - etl/test_*.py"
            echo "  - tests/feature_test_matrix.yaml (if adding a new test file)"
            echo ""
            echo "If this PR has no testable behaviour change, prefix the PR title with"
            echo "one of: chore, docs, refactor, ci, build, style, test"
            exit 1
          fi

          echo ""
          echo "Test delta found:"
          echo "$TEST_DELTA"
          echo "Test delta check passed."

      - name: Record backend job start time
        id: timing_start
        run: |
          echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/backend/requirements.txt', '**/backend/requirements-lock.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Validate backend requirements hygiene
        run: |
          python backend/scripts/validate_requirements_lock.py

      - name: Run repository hygiene checks
        run: |
          python -m scripts.repo_hygiene_check

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          # also install ETL-specific packages (used by upstream tests)
          if [ -f etl/requirements.txt ]; then pip install -r etl/requirements.txt; fi

      - name: Lint backend with flake8
        id: backend_lint
        run: |
          flake8 backend/ --count --statistics
        continue-on-error: true

      - name: Seed database
        run: |
          # populate the test database before running the suite
          python -m backend.manage seed
        env:
          PYTHONPATH: .
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Guard against duplicate players
        run: |
          python -m backend.manage audit-player-duplicates --fail-on-duplicates
        env:
          PYTHONPATH: .
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run backend tests with coverage
        id: backend_tests
        run: |
          python -m pytest backend -q \
            --tb=short \
            --cov=backend \
            --cov-report=xml:backend-coverage.xml \
            --cov-report=term-missing:skip-covered 2>&1 | tee backend-test.log
        env:
          PYTHONPATH: .
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Upload backend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend-coverage.xml

      - name: Upload backend test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-log
          if-no-files-found: ignore
          path: backend-test.log

      - name: Backend failure diagnostics
        if: failure()
        run: |
          echo "Backend CI failure diagnostics:"
          echo "- Lint step id: backend_lint"
          echo "- Test step id: backend_tests"
          if [ -f backend-test.log ]; then
            echo ""
            echo "Last 50 lines of backend-test.log:"
            tail -n 50 backend-test.log
          fi

      - name: Publish backend CI summary
        if: always()
        run: |
          {
            echo "## Backend CI Details"
            echo ""
            echo "- Lint result: ${{ steps.backend_lint.outcome }}"
            echo "- Test result: ${{ steps.backend_tests.outcome }}"
            echo ""
            if [ -f backend-test.log ]; then
              echo "### Coverage Summary"
              echo '```'
              grep -E 'TOTAL|^[-]{20}' backend-test.log | tail -3 || echo "Coverage data not available"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Categorize backend failure
        if: always()
        id: result_category
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "category=none" >> "$GITHUB_OUTPUT"
          else
            echo "category=backend" >> "$GITHUB_OUTPUT"
          fi

      - name: Record backend job duration
        if: always()
        id: timing_end
        env:
          START_EPOCH: ${{ steps.timing_start.outputs.epoch }}
        run: |
          NOW_EPOCH=$(date +%s)
          if [ -z "$START_EPOCH" ]; then
            START_EPOCH=$NOW_EPOCH
          fi
          DURATION=$((NOW_EPOCH - START_EPOCH))
          echo "duration_seconds=$DURATION" >> "$GITHUB_OUTPUT"

  api-integration:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      duration_seconds: ${{ steps.timing_end.outputs.duration_seconds }}
      failure_category: ${{ steps.result_category.outputs.category }}
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: fantasy_pi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/fantasy_pi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record API integration job start time
        id: timing_start
        run: |
          echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Seed database
        run: |
          python -m backend.manage seed
        env:
          PYTHONPATH: .
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run API integration and contract tests
        run: |
          python -m pytest backend/tests/test_api_integration_pipeline.py -q
        env:
          PYTHONPATH: .
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run API smoke checks against local service
        run: |
          set -euo pipefail
          python -m uvicorn backend.main:app --host 127.0.0.1 --port 8012 > api-smoke.log 2>&1 &
          UVICORN_PID=$!

          cleanup() {
            kill "$UVICORN_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          for i in {1..25}; do
            if curl -fsS http://127.0.0.1:8012/health > /tmp/health.json; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:8012/openapi.json > /tmp/openapi.json

          python - <<'PY'
          import json
          from pathlib import Path

          health = json.loads(Path('/tmp/health.json').read_text(encoding='utf-8'))
          openapi = json.loads(Path('/tmp/openapi.json').read_text(encoding='utf-8'))

          assert health.get('status') in {'ok', 'degraded'}, health
          assert '/auth/token' in openapi.get('paths', {}), 'Missing /auth/token in OpenAPI paths'
          assert '/health' in openapi.get('paths', {}), 'Missing /health in OpenAPI paths'
          print('API smoke contract checks passed.')
          PY

      - name: Upload API smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-smoke-logs
          if-no-files-found: ignore
          path: api-smoke.log

      - name: Categorize API integration failure
        if: always()
        id: result_category
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "category=none" >> "$GITHUB_OUTPUT"
          else
            echo "category=api_contract" >> "$GITHUB_OUTPUT"
          fi

      - name: Record API integration job duration
        if: always()
        id: timing_end
        env:
          START_EPOCH: ${{ steps.timing_start.outputs.epoch }}
        run: |
          NOW_EPOCH=$(date +%s)
          if [ -z "$START_EPOCH" ]; then
            START_EPOCH=$NOW_EPOCH
          fi
          DURATION=$((NOW_EPOCH - START_EPOCH))
          echo "duration_seconds=$DURATION" >> "$GITHUB_OUTPUT"

  frontend-test:
    runs-on: ubuntu-latest
    outputs:
      duration_seconds: ${{ steps.timing_end.outputs.duration_seconds }}
      failure_category: ${{ steps.result_category.outputs.category }}
    strategy:
      matrix:
        node-version: [20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record frontend job start time
        id: timing_start
        run: |
          echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Vite and Vitest artifacts
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules/.vite
            frontend/.vitest
          key: frontend-build-cache-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'frontend/vite.config.*', 'frontend/vitest.config.*') }}
          restore-keys: |
            frontend-build-cache-${{ runner.os }}-

      - name: Install frontend deps
        working-directory: frontend
        env:
          # Cypress binary is not needed for lint/unit tests; skip the download
          # to avoid failures when download.cypress.io is unreachable.
          CYPRESS_INSTALL_BINARY: "0"
        run: |
          npm ci --legacy-peer-deps

      - name: Lint & Format Check
        id: frontend_lint
        working-directory: frontend
        run: |
          npm run lint

      - name: Type check frontend
        id: frontend_typecheck
        working-directory: frontend
        run: |
          npm run typecheck

      - name: Responsive breakpoint audit
        id: frontend_responsive_audit
        working-directory: frontend
        # script lives one level above the frontend directory
        run: |
          bash ../audit-breakpoints.sh

      - name: Run frontend tests
        id: frontend_unit_tests
        working-directory: frontend
        run: |
          npm run test:coverage -- --run tests/PageSmokes.test.jsx

      - name: Run snapshot tests
        id: frontend_snapshot_tests
        working-directory: frontend
        run: |
          npm run test:snapshots

      - name: Optional visual regression validation
        if: github.event_name == 'workflow_dispatch'
        id: frontend_optional_visual
        working-directory: frontend
        run: |
          npm run test:visual-optional

      - name: Build frontend and capture logs
        id: frontend_build
        working-directory: frontend
        run: |
          set -o pipefail
          npm run build 2>&1 | tee frontend-build.log

      - name: Upload frontend build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-log
          if-no-files-found: ignore
          path: frontend/frontend-build.log

      - name: Frontend failure diagnostics
        if: failure()
        working-directory: frontend
        run: |
          echo "Frontend CI failure diagnostics:"
          echo "- Lint step id: frontend_lint"
          echo "- Type check step id: frontend_typecheck"
          echo "- Unit test step id: frontend_unit_tests"
          echo "- Snapshot step id: frontend_snapshot_tests"
          echo "- Build step id: frontend_build"
          if [ -f frontend-build.log ]; then
            echo "Last 100 lines of frontend-build.log:"
            tail -n 100 frontend-build.log
          fi

      - name: Publish frontend CI summary
        if: always()
        run: |
          {
            echo "## Frontend CI Details"
            echo ""
            echo "- Lint result: ${{ steps.frontend_lint.outcome }}"
            echo "- Type check result: ${{ steps.frontend_typecheck.outcome }}"
            echo "- Responsive audit result: ${{ steps.frontend_responsive_audit.outcome }}"
            echo "- Unit test result: ${{ steps.frontend_unit_tests.outcome }}"
            echo "- Snapshot test result: ${{ steps.frontend_snapshot_tests.outcome }}"
            echo "- Build result: ${{ steps.frontend_build.outcome }}"
            echo "- Optional visual regression result: ${{ steps.frontend_optional_visual.outcome || 'not_run' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload frontend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: Categorize frontend failure
        if: always()
        id: result_category
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "category=none" >> "$GITHUB_OUTPUT"
          else
            echo "category=frontend" >> "$GITHUB_OUTPUT"
          fi

      - name: Record frontend job duration
        if: always()
        id: timing_end
        env:
          START_EPOCH: ${{ steps.timing_start.outputs.epoch }}
        run: |
          NOW_EPOCH=$(date +%s)
          if [ -z "$START_EPOCH" ]; then
            START_EPOCH=$NOW_EPOCH
          fi
          DURATION=$((NOW_EPOCH - START_EPOCH))
          echo "duration_seconds=$DURATION" >> "$GITHUB_OUTPUT"

  e2e:
    runs-on: ubuntu-latest
    needs: frontend-test
    outputs:
      duration_seconds: ${{ steps.timing_end.outputs.duration_seconds }}
      failure_category: ${{ steps.result_category.outputs.category }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record API/E2E job start time
        id: timing_start
        run: |
          echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            cypress-${{ runner.os }}-

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run Cypress E2E
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          install: false
          start: npm run dev
          wait-on: http://localhost:5173
          wait-on-timeout: 120
          browser: chrome
          spec: cypress/e2e/**/*.spec.js

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          if-no-files-found: ignore
          path: frontend/cypress/screenshots

      - name: Upload Cypress videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          if-no-files-found: ignore
          path: frontend/cypress/videos

      - name: Categorize API/E2E failure
        if: always()
        id: result_category
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "category=none" >> "$GITHUB_OUTPUT"
          else
            echo "category=api" >> "$GITHUB_OUTPUT"
          fi

      - name: Record API/E2E job duration
        if: always()
        id: timing_end
        env:
          START_EPOCH: ${{ steps.timing_start.outputs.epoch }}
        run: |
          NOW_EPOCH=$(date +%s)
          if [ -z "$START_EPOCH" ]; then
            START_EPOCH=$NOW_EPOCH
          fi
          DURATION=$((NOW_EPOCH - START_EPOCH))
          echo "duration_seconds=$DURATION" >> "$GITHUB_OUTPUT"

  observability:
    name: CI Observability Report
    runs-on: ubuntu-latest
    needs: [test, api-integration, frontend-test, e2e]
    if: always()
    steps:
      - name: Build CI dashboard summary
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BACKEND_RESULT: ${{ needs.test.result }}
          FRONTEND_RESULT: ${{ needs['frontend-test'].result }}
          API_CONTRACT_RESULT: ${{ needs['api-integration'].result }}
          API_RESULT: ${{ needs.e2e.result }}
          BACKEND_DURATION: ${{ needs.test.outputs.duration_seconds }}
          API_CONTRACT_DURATION: ${{ needs['api-integration'].outputs.duration_seconds }}
          FRONTEND_DURATION: ${{ needs['frontend-test'].outputs.duration_seconds }}
          API_DURATION: ${{ needs.e2e.outputs.duration_seconds }}
          BACKEND_CATEGORY: ${{ needs.test.outputs.failure_category }}
          API_CONTRACT_CATEGORY: ${{ needs['api-integration'].outputs.failure_category }}
          FRONTEND_CATEGORY: ${{ needs['frontend-test'].outputs.failure_category }}
          API_CATEGORY: ${{ needs.e2e.outputs.failure_category }}
        run: |
          status_icon() {
            case "$1" in
              success) echo "SUCCESS" ;;
              failure) echo "FAILURE" ;;
              cancelled) echo "CANCELLED" ;;
              skipped) echo "SKIPPED" ;;
              *) echo "UNKNOWN" ;;
            esac
          }

          BACKEND_DURATION=${BACKEND_DURATION:-0}
          API_CONTRACT_DURATION=${API_CONTRACT_DURATION:-0}
          FRONTEND_DURATION=${FRONTEND_DURATION:-0}
          API_DURATION=${API_DURATION:-0}
          TOTAL_DURATION=$((BACKEND_DURATION + API_CONTRACT_DURATION + FRONTEND_DURATION + API_DURATION))

          FAILED_CATEGORIES=""
          [ "$BACKEND_CATEGORY" != "none" ] && FAILED_CATEGORIES="$FAILED_CATEGORIES backend"
          [ "$API_CONTRACT_CATEGORY" != "none" ] && FAILED_CATEGORIES="$FAILED_CATEGORIES api_contract"
          [ "$FRONTEND_CATEGORY" != "none" ] && FAILED_CATEGORIES="$FAILED_CATEGORIES frontend"
          [ "$API_CATEGORY" != "none" ] && FAILED_CATEGORIES="$FAILED_CATEGORIES api"

          if [ -z "$FAILED_CATEGORIES" ]; then
            FAILED_CATEGORIES="none"
          fi

          {
            echo "## CI/CD Observability Dashboard"
            echo ""
            echo "Pipeline: [$GITHUB_WORKFLOW run #$GITHUB_RUN_NUMBER]($RUN_URL)"
            echo ""
            echo "| Area | Status | Duration (s) | Failure Category |"
            echo "|---|---|---:|---|"
            echo "| Backend | $(status_icon "$BACKEND_RESULT") | $BACKEND_DURATION | ${BACKEND_CATEGORY:-none} |"
            echo "| API Contract & Smoke | $(status_icon "$API_CONTRACT_RESULT") | $API_CONTRACT_DURATION | ${API_CONTRACT_CATEGORY:-none} |"
            echo "| Frontend | $(status_icon "$FRONTEND_RESULT") | $FRONTEND_DURATION | ${FRONTEND_CATEGORY:-none} |"
            echo "| API / E2E | $(status_icon "$API_RESULT") | $API_DURATION | ${API_CATEGORY:-none} |"
            echo "| Deployment | NOT RUN | 0 | deployment_not_in_scope |"
            echo ""
            echo "- Total build time (tracked jobs): ${TOTAL_DURATION}s"
            echo "- Failed categories: $FAILED_CATEGORIES"
            echo "- Frontend checks include lint, typecheck, responsive audit, unit coverage, snapshots, and build output logs"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack on CI failure
        if: needs.test.result != 'success' || needs['api-integration'].result != 'success' || needs['frontend-test'].result != 'success' || needs.e2e.result != 'success'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BACKEND_RESULT: ${{ needs.test.result }}
          API_CONTRACT_RESULT: ${{ needs['api-integration'].result }}
          FRONTEND_RESULT: ${{ needs['frontend-test'].result }}
          API_RESULT: ${{ needs.e2e.result }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; skipping Slack notification."
            exit 0
          fi

          payload=$(cat <<EOF
          {
            "text": "CI failed for ${{ github.repository }} on ${{ github.ref_name }}. Backend=$BACKEND_RESULT, API Contract=$API_CONTRACT_RESULT, Frontend=$FRONTEND_RESULT, API/E2E=$API_RESULT. Run: $RUN_URL"
          }
          EOF
          )
          curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"

      - name: Notify Teams on CI failure
        if: needs.test.result != 'success' || needs['api-integration'].result != 'success' || needs['frontend-test'].result != 'success' || needs.e2e.result != 'success'
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BACKEND_RESULT: ${{ needs.test.result }}
          API_CONTRACT_RESULT: ${{ needs['api-integration'].result }}
          FRONTEND_RESULT: ${{ needs['frontend-test'].result }}
          API_RESULT: ${{ needs.e2e.result }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL not configured; skipping Teams notification."
            exit 0
          fi

          payload=$(cat <<EOF
          {
            "text": "CI failed for ${{ github.repository }} on ${{ github.ref_name }}. Backend=$BACKEND_RESULT, API Contract=$API_CONTRACT_RESULT, Frontend=$FRONTEND_RESULT, API/E2E=$API_RESULT. Run: $RUN_URL"
          }
          EOF
          )
          curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$TEAMS_WEBHOOK_URL"
