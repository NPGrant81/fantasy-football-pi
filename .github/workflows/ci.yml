name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
    # spin up a postgres container for backend tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: fantasy_pi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/fantasy_pi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/backend/requirements.txt', '**/backend/requirements-lock.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Validate backend requirements hygiene
        run: |
          python backend/scripts/validate_requirements_lock.py

      - name: Run repository hygiene checks
        run: |
          python -m scripts.repo_hygiene_check

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          # also install ETL-specific packages (used by upstream tests)
          if [ -f etl/requirements.txt ]; then pip install -r etl/requirements.txt; fi

      - name: Seed database
        run: |
          # populate the test database before running the suite
          python -m backend.manage seed
        env:
          PYTHONPATH: .
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Guard against duplicate players
        run: |
          python -m backend.manage audit-player-duplicates --fail-on-duplicates
        env:
          PYTHONPATH: .
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run backend tests
        run: |
          python -m pytest backend -q
        env:
          PYTHONPATH: .
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - name: Run backend coverage
        if: always()
        run: |
          # limit coverage run to backend directory to avoid unrelated etl tests
          python -m pytest backend --maxfail=1 --disable-warnings -q --cov=backend --cov-report=xml:backend-coverage.xml
        env:
          PYTHONPATH: .
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - name: Upload backend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend-coverage.xml

  frontend-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install frontend deps
        working-directory: frontend
        env:
          # Cypress binary is not needed for lint/unit tests; skip the download
          # to avoid failures when download.cypress.io is unreachable.
          CYPRESS_INSTALL_BINARY: "0"
        run: |
          npm ci --legacy-peer-deps

      - name: Lint & Format Check
        working-directory: frontend
        run: |
          npm run lint
      - name: Responsive breakpoint audit
        working-directory: frontend
        # script lives one level above the frontend directory
        run: |
          bash ../audit-breakpoints.sh

      - name: Run frontend tests
        working-directory: frontend
        run: |
          npm run test:coverage -- --run tests/PageSmokes.test.jsx
      - name: Upload frontend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

  e2e:
    runs-on: ubuntu-latest
    needs: frontend-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            cypress-${{ runner.os }}-

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run Cypress E2E
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          install: false
          start: npm run dev
          wait-on: http://localhost:5173
          wait-on-timeout: 120
          browser: chrome
          spec: cypress/e2e/**/*.spec.js

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          if-no-files-found: ignore
          path: frontend/cypress/screenshots

      - name: Upload Cypress videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          if-no-files-found: ignore
          path: frontend/cypress/videos
