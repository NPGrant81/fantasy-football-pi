  <!-- laces horizontal stitches -->
  <line x1="28" y1="25" x2="36" y2="25" stroke="#ccc" stroke-width="1.5"/>
  <line x1="28" y1="29" x2="36" y2="29" stroke="#ccc" stroke-width="1.5"/>
  <line x1="28" y1="33" x2="36" y2="33" stroke="#ccc" stroke-width="1.5"/>
