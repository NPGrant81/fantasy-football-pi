repos:
  - repo: local
    hooks:
      # --- PRE-COMMIT STAGE (fast checks) ---
      - id: pytest-collect
        name: Backend Import Check
        entry: bash -c "export PYTHONPATH=backend && python -m pytest backend --collect-only -q"
        language: system
        stages: [pre-commit]
        pass_filenames: false

      - id: refresh-docs-index
        name: Regenerate Docs
        entry: python -m scripts.refresh_docs_index
        language: system
        stages: [pre-commit]

      - id: repo-hygiene-check
        name: Repo Hygiene Check
        entry: python -m scripts.repo_hygiene_check
        language: system
        stages: [pre-commit]
        pass_filenames: false

      - id: frontend-lint
        name: Frontend Lint & Fix
        entry: bash -c "cd frontend && npm run lint:fix && npx prettier --write 'src/**/*.{js,jsx}'"
        language: system
        stages: [pre-commit]

      - id: dependency-audit
        name: Run dependency audit helper
        entry: python backend/scripts/check_dependencies.py
        language: python
        args: ["--lock-file"]
        always_run: true
        require_serial: true
        stages: [pre-commit]
        pass_filenames: false

      - id: requirements-lock-sync
        name: Validate requirements lock sync
        entry: python backend/scripts/validate_requirements_lock.py
        language: python
        stages: [pre-commit]
        pass_filenames: false

  - repo: local
    hooks:
      # --- PRE-PUSH STAGE (heavier checks) ---
      - id: unit-tests
        name: Backend Unit Tests
        entry: bash -c "export PYTHONPATH=backend && python -m pytest backend -q"
        language: system
        stages: [pre-push]
        pass_filenames: false

      - id: alembic-check
        name: Verify Alembic migrations apply
        entry: bash -c "export PYTHONPATH=backend && python -m alembic check"
        language: system
        stages: [pre-push]
        pass_filenames: false

      - id: e2e-tests
        name: Cypress E2E
        entry: bash -c "cd frontend && npm run e2e"
        language: system
        stages: [pre-push]
        pass_filenames: false

  - repo: local
    hooks:
      - id: pytest-collect
        pass_filenames: false

      - id: dependency-audit
        name: Run dependency audit helper
        entry: python backend/scripts/check_dependencies.py
        language: python
        args: ["--lock-file"]
        always_run: true
        require_serial: true
        stages: [pre-commit]
        pass_filenames: false
      - id: unit-tests
        name: Run backend unit tests (pre-push)
        entry: |
          python - <<'PY'
          import subprocess, sys, glob
          # install deps just in case
          subprocess.check_call([sys.executable, "-m", "pip", "install", "-r", "backend/requirements.txt"])
          if glob.glob("etl/requirements*.txt"):
              for f in glob.glob("etl/requirements*.txt"):
                  subprocess.check_call([sys.executable, "-m", "pip", "install", "-r", f])
          sys.exit(subprocess.call([sys.executable, "-m", "pytest", "backend", "-q"]))
          PY
        language: python
        stages: [pre-push]
        pass_filenames: false

      - id: alembic-check
        name: Verify Alembic migrations apply
        entry: python -m alembic check
        language: system
        stages: [pre-push]
        pass_filenames: false

      - id: e2e-tests
        name: Run Cypress E2E tests (pre-push)
        entry: |
          python - <<'PY'
          import subprocess, os
          cwd = os.path.join(os.getcwd(), 'frontend')
          subprocess.check_call(['npm', 'ci', '--silent'], cwd=cwd)
          subprocess.check_call(['npm', 'run', 'e2e'], cwd=cwd)
          PY
        language: python
        stages: [pre-push]
        pass_filenames: false
